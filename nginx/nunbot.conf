server {
    server_name nunbot.myserverlongstaff.com;

    # Lightweight compression for Streamlit's HTML/CSS/JS payloads.
    gzip on;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/x-javascript application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;

        # WebSocket / Streamlit support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nunbot.myserverlongstaff.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nunbot.myserverlongstaff.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

server {
    if ($host = nunbot.myserverlongstaff.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name nunbot.myserverlongstaff.com;
    return 404; # managed by Certbot
}
